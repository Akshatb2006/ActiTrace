services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: actitrace
      POSTGRES_PASSWORD: actitrace
      POSTGRES_DB: actitrace
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actitrace"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://actitrace:actitrace@postgres:5432/actitrace
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./backend/app/models/store:/app/app/models/store
      - ./UCI HAR Dataset:/app/UCI HAR Dataset:ro
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
