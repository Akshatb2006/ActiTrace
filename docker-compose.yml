services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: actitrace
      POSTGRES_PASSWORD: actitrace
      POSTGRES_DB: actitrace
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Not exposed on the host — the backend reaches it over the compose network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actitrace"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://actitrace:actitrace@postgres:5432/actitrace
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    volumes:
      - ./backend/app/models/store:/app/app/models/store
      - ./UCI HAR Dataset:/app/UCI HAR Dataset:ro
    ports:
      - "8100:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3100:80"

volumes:
  pgdata:
