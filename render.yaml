# Render Blueprint — provisions backend + managed Postgres + static frontend.
# Deploy: https://dashboard.render.com/blueprints → New Blueprint → point at this repo.
# After first deploy, set GROQ_API_KEY in the backend service's env vars.

databases:
  - name: actitrace-db
    plan: free
    databaseName: actitrace
    user: actitrace

services:
  - type: web
    name: actitrace-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: actitrace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: https://actitrace-frontend.onrender.com

  - type: web
    name: actitrace-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://actitrace-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
